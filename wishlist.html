<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wishlist | 44Promotions</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',sans-serif;background:#f5f5f5;color:#333}
h1,h2{font-family:'Oswald',sans-serif}
.navbar{background:#1e3c72;padding:15px 0}
.navbar a{color:#fff;text-decoration:none;font-size:22px;font-weight:700}
.container{max-width:1200px;margin:0 auto;padding:20px}
.wishlist-section{background:#fff;border-radius:12px;padding:40px;margin:40px 0;box-shadow:0 4px20px rgba(0,0,0,0.1)}
.wishlist-section h2{color:#1e3c72;margin-bottom:30px}
.empty-state{text-align:center;padding:60px 20px}
.empty-state i{font-size:60px;color:#ddd;margin-bottom:20px}
.empty-state h3{color:#666;margin-bottom:10px}
.empty-state p{color:#999;margin-bottom:20px}
.empty-state a{display:inline-block;background:#1e3c72;color:#fff;padding:12px 30px;border-radius:8px;text-decoration:none}
.wishlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px}
.wishlist-item{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;transition:all 0.3s}
.wishlist-item:hover{border-color:#1e3c72;transform:translateY(-5px)}
.wishlist-item img{width:100%;height:200px;object-fit:cover;background:#f5f5f5}
.wishlist-info{padding:15px}
.wishlist-info h4{font-size:14px;margin-bottom:10px;line-height:1.4}
.wishlist-info .price{color:#1e3c72;font-weight:700;font-size:18px}
.wishlist-actions{display:flex;gap:10px;margin-top:10px}
.wishlist-actions button{flex:1;padding:10px;border-radius:6px;font-size:13px;cursor:pointer}
.btn-view{background:#1e3c72;color:#fff;border:none}
.btn-remove{background:#fff;color:#666;border:1px solid #ddd}
.back-link{text-align:center;margin-top:30px}
.back-link a{color:#1e3c72}
</style>
</head>
<body>
<nav class="navbar">
<div class="container">
<a href="index.html">44Promotions</a>
</div>
</nav>
<div class="container">
<div class="wishlist-section">
<h2>My Wishlist</h2>
<div id="wishlistContent">
<div class="empty-state">
<i class="fas fa-heart"></i>
<h3>Your wishlist is empty</h3>
<p>Save products you like to your wishlist</p>
<a href="products.html">Browse Products</a>
</div>
</div>
</div>
<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
</div>
<script>
// Wishlist functionality (localStorage)
function loadWishlist() {
    const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
    const container = document.getElementById('wishlistContent');
    
    if (wishlist.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-heart"></i><h3>Your wishlist is empty</h3><p>Save products you like to your wishlist</p><a href="products.html">Browse Products</a></div>';
        return;
    }
    
    let html = '<div class="wishlist-grid">';
    wishlist.forEach(item => {
        html += '<div class="wishlist-item"><img src="' + item.image + '" alt="' + item.name + '"><div class="wishlist-info"><h4>' + item.name + '</h4><div class="price">$' + item.price + '</div><div class="wishlist-actions"><button class="btn-view" onclick="viewProduct(\'' + item.id + '\')">View</button><button class="btn-remove" onclick="removeFromWishlist(\'' + item.id + '\')">Remove</button></div></div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
}

function viewProduct(id) {
    window.location.href = 'product-detail.html?id=' + id;
}

function removeFromWishlist(id) {
    let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
    wishlist = wishlist.filter(item => item.id !== id);
    localStorage.setItem('wishlist', JSON.stringify(wishlist));
    loadWishlist();
}

loadWishlist();
</script>
</body>
</html>
