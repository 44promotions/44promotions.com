<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register | 44Promotions</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',sans-serif;background:#f5f5f5;color:#333}
h1,h2,h3,h4{font-family:'Oswald',sans-serif}
.navbar{background:#1e3c72;padding:15px 0;color:#fff}
.navbar a{color:#fff;text-decoration:none;font-size:22px;font-weight:700}
.container{max-width:1200px;margin:0 auto;padding:20px}
.reg-box{max-width:500px;margin:40px auto;background:#fff;border-radius:12px;padding:40px;box-shadow:0 4px20px rgba(0,0,0,0.1)}
.reg-box h2{text-align:center;margin-bottom:30px;color:#1e3c72}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;font-weight:600;font-size:14px}
.form-group input,.form-group select{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.btn-reg{width:100%;background:#1e3c72;color:#fff;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.btn-reg:hover{background:#2a5298}
.login-link{text-align:center;margin-top:20px}
.login-link a{color:#1e3c72;font-size:14px}
.back-link{margin-top:20px;text-align:center}
.back-link a{color:#666}
</style>
</head>
<body>
<nav class="navbar">
<div class="container">
<a href="index.html">44Promotions</a>
</div>
</nav>
<div class="container">
<div class="reg-box">
<h2>Create Account</h2>
<form onsubmit="event.preventDefault(); alert('Registration successful! This feature is coming soon.');">
<div class="form-group">
<label>Company Name</label>
<input type="text" placeholder="Enter company name">
</div>
<div class="form-group">
<label>Full Name *</label>
<input type="text" placeholder="Enter your full name" required>
</div>
<div class="form-group">
<label>Email Address *</label>
<input type="email" placeholder="Enter your email" required>
</div>
<div class="form-group">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number">
</div>
<div class="form-group">
<label>Password *</label>
<input type="password" placeholder="Create a password" required>
</div>
<div class="form-group">
<label>Confirm Password *</label>
<input type="password" placeholder="Confirm password" required>
</div>
<button type="submit" class="btn-reg">Register</button>
</form>
<div class="login-link">
<p>Already have an account? <a href="login.html">Sign In</a></p>
</div>
</div>
<div class="back-link">
<a href="index.html">← Back to Home</a>
</div>
</div>
</body>
</html>
