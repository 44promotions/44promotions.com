<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login | 44Promotions</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #FEF9E7 0%, #FCF3CF 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-container { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 50px; width: 100%; max-width: 420px; }
.login-logo { text-align: center; margin-bottom: 30px; }
.login-logo img { height: 60px; }
.login-logo h2 { font-size: 24px; margin-top: 15px; color: #1F2937; }
.login-logo p { color: #6B7280; font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #1F2937; }
.form-group input { width: 100%; padding: 14px 16px; border: 2px solid #E5E7EB; border-radius: 10px; font-size: 15px; transition: border-color 0.3s; }
.form-group input:focus { outline: none; border-color: #D4AC0D; }
.btn-login { width: 100%; padding: 14px; background: #D4AC0D; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
.btn-login:hover { background: #9A7D0A; }
.alert { padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; display: none; }
.alert-danger { background: #FEE2E2; color: #DC2626; }
.alert-success { background: #D1FAE5; color: #059669; }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-logo">
    <img src="../44-logo.png" alt="44Promotions">
    <h2>Admin Panel</h2>
    <p>44Promotions Management System</p>
  </div>
  
  <div id="alertMessage" class="alert"></div>
  
  <form id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">Sign In</button>
  </form>
  
  <p style="text-align: center; margin-top: 20px; color: #6B7280; font-size: 13px;">
    Default: admin / admin123
  </p>
</div>

<script>
// Check if already logged in
if (localStorage.getItem('adminLoggedIn') === 'true') {
  window.location.href = 'dashboard.html';
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const alertEl = document.getElementById('alertMessage');
  
  // Simple authentication (in production, use server-side auth)
  if (username === 'admin' && password === 'admin123') {
    localStorage.setItem('adminLoggedIn', 'true');
    localStorage.setItem('adminUser', username);
    window.location.href = 'dashboard.html';
  } else if (username === 'editor' && password === 'editor123') {
    localStorage.setItem('adminLoggedIn', 'true');
    localStorage.setItem('adminUser', username);
    localStorage.setItem('adminRole', 'editor');
    window.location.href = 'dashboard.html';
  } else {
    alertEl.className = 'alert alert-danger';
    alertEl.textContent = 'Invalid username or password';
    alertEl.style.display = 'block';
  }
});
</script>

</body>
</html>
