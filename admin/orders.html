<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orders | 44Promotions Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f3f4f6; }
.sidebar { width: 260px; background: #1F2937; min-height: 100vh; position: fixed; }
.sidebar-logo { padding: 20px; border-bottom: 1px solid #374151; }
.sidebar-logo img { height: 40px; }
.sidebar-logo h3 { color: #fff; font-size: 18px; margin-top: 10px; }
.sidebar-menu { padding: 20px 0; }
.menu-item { display: block; padding: 14px 24px; color: #9CA3AF; text-decoration: none; }
.menu-item:hover, .menu-item.active { background: #374151; color: #F7DC6F; }
.menu-item i { width: 24px; }
.main-content { margin-left: 260px; padding: 30px; }
.top-bar { background: #fff; padding: 16px 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #E5E7EB; margin: -30px -30px 30px -30px; }
.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; }
.btn-secondary { background: #6B7280; color: #fff; }
.empty-state { text-align: center; padding: 80px 20px; color: #6B7280; }
.empty-state i { font-size: 64px; color: #D1D5DB; margin-bottom: 20px; }
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <img src="../44-logo.png" alt="44Promotions">
    <h3>Admin Panel</h3>
  </div>
  <div class="sidebar-menu">
    <a href="dashboard.html" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
    <a href="products.html" class="menu-item"><i class="fas fa-box"></i> Products</a>
    <a href="categories.html" class="menu-item"><i class="fas fa-tags"></i> Categories</a>
    <a href="orders.html" class="menu-item active"><i class="fas fa-shopping-cart"></i> Orders</a>
    <a href="inquiries.html" class="menu-item"><i class="fas fa-envelope"></i> Inquiries</a>
    <a href="settings.html" class="menu-item"><i class="fas fa-cog"></i> Settings</a>
  </div>
</nav>

<div class="main-content">
  <div class="top-bar">
    <h4>Orders Management</h4>
    <button class="btn btn-secondary" onclick="logout()">Logout</button>
  </div>

  <div class="empty-state">
    <i class="fas fa-shopping-cart"></i>
    <h3>No Orders Yet</h3>
    <p>Orders from customers will appear here</p>
  </div>
</div>

<script>
if (localStorage.getItem('adminLoggedIn') !== 'true') window.location.href = 'index.html';
function logout() { localStorage.clear(); window.location.href = 'index.html'; }
</script>

</body>
</html>
